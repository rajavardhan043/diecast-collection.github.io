name: Update Car Data

on:
  schedule:
    - cron: '05 2 * * 1,3,4,6'  # Thu, Sat, Mon, Wed at 6 AM IST (every alternate day starting Thursday)
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper and patch generator
        run: python3 scripts/scrape_and_patch.py

      - name: Remove old patch files (no longer used)
        run: rm -f patch-v*.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-update: new car data from Hot Wheels Wiki"
          git pull --rebase origin ${{ github.ref_name }}
          git push

      - name: Trigger app repo to sync carLookup
        if: steps.changes.outputs.changed == 'true'
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.APP_REPO_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rajavardhan043/DiecastApp/dispatches \
            -d '{"event_type":"sync-car-data"}'
